<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejelentkezés - StyleMasters Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <form id="login-form" class="booking-form">
            <h2>Vállalkozói Belépés</h2>
            <div id="error-message" class="error-message" style="display: none;"></div>
            <div class="form-group">
                <label for="username">Felhasználónév</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Jelszó</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="cta-button">Bejelentkezés</button>
             <p class="back-link"><a href="index.html">&larr; Vissza a főoldalra</a></p>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            // Hardcoded credentials
            const validUser = 'admin';
            const validPass = '1234';

            if (username === validUser && password === validPass) {
                // Sikeres bejelentkezés
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                // Sikertelen bejelentkezés
                errorMessage.textContent = 'Hibás felhasználónév vagy jelszó.';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
