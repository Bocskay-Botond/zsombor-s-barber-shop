<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés – Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

<div class="login-card">
  <div class="login-logo">
    <div class="logo">✂ Zsombor's</div>
    <p>Vállalkozói belépés</p>
  </div>
  <div class="error-box" id="error-box"></div>
  <form id="login-form">
    <div class="form-group" style="margin-bottom:1rem">
      <label for="username">Felhasználónév</label>
      <input type="text" id="username" autocomplete="username" placeholder="admin" required>
    </div>
    <div class="form-group">
      <label for="password">Jelszó</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary" id="login-btn">Bejelentkezés</button>
  </form>
  <p class="back-link"><a href="/">&larr; Vissza a főoldalra</a></p>
</div>

<script src="login.js"></script>
</body>
</html>
