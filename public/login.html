<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés – Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

<div class="login-card">
  <div class="login-logo">
    <div class="logo">✂ Zsombor's</div>
    <p>Vállalkozói belépés</p>
  </div>
  <div class="error-box" id="error-box"></div>
  <form id="login-form">
    <div class="form-group" style="margin-bottom:1rem">
      <label for="username">Felhasználónév</label>
      <input type="text" id="username" autocomplete="username" placeholder="admin" required>
    </div>
    <div class="form-group">
      <label for="password">Jelszó</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary" id="login-btn">Bejelentkezés</button>
  </form>
  <p class="back-link"><a href="/">&larr; Vissza a főoldalra</a></p>
</div>

<script>
  if (localStorage.getItem('bb_token')) window.location.href = '/admin';

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errBox = document.getElementById('error-box');
    errBox.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Bejelentkezés...';

    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });
      const data = await r.json();
      if (!r.ok) {
        errBox.textContent = data.error || 'Hiba történt';
        errBox.style.display = 'block';
        return;
      }
      localStorage.setItem('bb_token', data.token);
      localStorage.setItem('bb_user', data.username);
      window.location.href = '/admin';
    } catch {
      errBox.textContent = 'Hálózati hiba. Próbáld újra.';
      errBox.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Bejelentkezés';
    }
  });
</script>
</body>
</html>
